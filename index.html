<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onicore – Logo Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@300;400;800;900&family=Cormorant:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; font-family:'Inter',sans-serif; color:#fff; min-height:100vh; }

    .topbar {
      background:#000; padding:16px 28px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .topbar-title { font-size:13px; color:#666; letter-spacing:2px; text-transform:uppercase; }
    .topbar-brand { font-family:'Playfair Display',serif; font-size:20px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 2px;
      padding: 2px;
    }

    .logo-card {
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 40px 40px;
      gap: 32px;
      min-height: 340px;
      position: relative;
      cursor: pointer;
      transition: background .2s;
    }
    .logo-card:hover { background: #0a0a0a; }
    .logo-card.light { background: #f5f5f0; }
    .logo-card.light:hover { background: #eee; }

    .card-label {
      position: absolute; top: 18px; left: 22px;
      font-size: 11px; color: #444; letter-spacing: 2px; text-transform: uppercase;
    }
    .logo-card.light .card-label { color: #aaa; }

    .dl-btn {
      position: absolute; top: 14px; right: 16px;
      background: #1a1a1a; border: 1px solid #333;
      color: #888; border-radius: 6px;
      padding: 6px 12px; font-size: 11px;
      cursor: pointer; letter-spacing: 1px;
      transition: all .2s; text-transform: uppercase;
    }
    .logo-card.light .dl-btn { background: #fff; border-color: #ddd; color: #999; }
    .dl-btn:hover { color: #fff; border-color: #666; background: #222; }
    .logo-card.light .dl-btn:hover { color: #000; border-color: #999; background: #eee; }

    /* ─── LOGO 1: GEOMETRIC SLASH ─── */
    .logo-1 svg { overflow: visible; }

    /* ─── LOGO 3: TAGLINE ─── */
    .tagline {
      font-size: 11px; letter-spacing: 5px;
      text-transform: uppercase; color: #555;
      font-weight: 300;
    }
    .logo-card.light .tagline { color: #aaa; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">ONICORE</div>
  <div class="topbar-title">Logo Studio</div>
</div>

<div class="grid">

  <!-- LOGO 1: GEOMETRIC + SLASH (dark) -->
  <div class="logo-card" id="card1">
    <span class="card-label">01 — Geometric Slash</span>
    <button class="dl-btn" onclick="downloadSVG('svg1','onicore-logo-1-dark')">↓ JPG</button>
    <svg id="svg1" width="380" height="100" viewBox="0 0 380 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- O -->
      <text x="0" y="88" font-family="Inter" font-weight="900" font-size="96" fill="white" letter-spacing="-2">ONICORE</text>
      <!-- diagonal slash overlay -->
      <line x1="158" y1="8" x2="222" y2="92" stroke="#e74c3c" stroke-width="3.5"/>
      <!-- bottom accent line -->
      <line x1="0" y1="97" x2="380" y2="97" stroke="#333" stroke-width="1"/>
      <line x1="0" y1="97" x2="120" y2="97" stroke="#e74c3c" stroke-width="2"/>
    </svg>
    <div class="tagline">What is Earth Without Art</div>
  </div>

  <!-- LOGO 2: SPLIT WEIGHT (dark) -->
  <div class="logo-card" id="card2">
    <span class="card-label">02 — Split Weight</span>
    <button class="dl-btn" onclick="downloadSVG('svg2','onicore-logo-2-dark')">↓ JPG</button>
    <svg id="svg2" width="340" height="100" viewBox="0 0 340 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- ONI thin -->
      <text x="0" y="82" font-family="Inter" font-weight="300" font-size="86" fill="white" letter-spacing="8">ONI</text>
      <!-- CORE bold -->
      <text x="162" y="82" font-family="Inter" font-weight="900" font-size="86" fill="white" letter-spacing="-1">CORE</text>
      <!-- separator dot -->
      <circle cx="156" cy="48" r="5" fill="#e74c3c"/>
    </svg>
    <div class="tagline">Media &amp; Lifestyle</div>
  </div>

  <!-- LOGO 3: STACKED (dark) -->
  <div class="logo-card" id="card3">
    <span class="card-label">03 — Stacked</span>
    <button class="dl-btn" onclick="downloadSVG('svg3','onicore-logo-3-dark')">↓ JPG</button>
    <svg id="svg3" width="300" height="130" viewBox="0 0 300 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- ONI -->
      <text x="0" y="62" font-family="Inter" font-weight="900" font-size="68" fill="white" letter-spacing="18">ONI</text>
      <!-- line -->
      <rect x="0" y="72" width="300" height="2" fill="#e74c3c"/>
      <!-- CORE -->
      <text x="2" y="120" font-family="Inter" font-weight="300" font-size="52" fill="white" letter-spacing="36">CORE</text>
    </svg>
  </div>

  <!-- LOGO 4: CIRCLE EMBLEM (dark) -->
  <div class="logo-card" id="card4">
    <span class="card-label">04 — Globe Emblem</span>
    <button class="dl-btn" onclick="downloadSVG('svg4','onicore-logo-globe')">↓ JPG</button>
    <svg id="svg4" width="300" height="160" viewBox="0 0 300 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="gc">
          <circle cx="150" cy="80" r="71"/>
        </clipPath>
      </defs>
      <!-- outer globe circle -->
      <circle cx="150" cy="80" r="72" stroke="white" stroke-width="1.2" fill="none"/>
      <!-- globe wireframe clipped -->
      <g clip-path="url(#gc)">
        <!-- longitude lines (vertical ellipses) -->
        <ellipse cx="150" cy="80" rx="48" ry="72" stroke="white" stroke-width="0.7" fill="none" opacity="0.3"/>
        <ellipse cx="150" cy="80" rx="22" ry="72" stroke="white" stroke-width="0.7" fill="none" opacity="0.2"/>
        <!-- latitude lines (horizontal ellipses) -->
        <ellipse cx="150" cy="80" rx="72" ry="22" stroke="white" stroke-width="0.7" fill="none" opacity="0.3"/>
        <ellipse cx="150" cy="52" rx="60" ry="13" stroke="white" stroke-width="0.6" fill="none" opacity="0.2"/>
        <ellipse cx="150" cy="108" rx="60" ry="13" stroke="white" stroke-width="0.6" fill="none" opacity="0.2"/>
        <ellipse cx="150" cy="28" rx="38" ry="8" stroke="white" stroke-width="0.5" fill="none" opacity="0.15"/>
        <ellipse cx="150" cy="132" rx="38" ry="8" stroke="white" stroke-width="0.5" fill="none" opacity="0.15"/>
      </g>
      <!-- Onicore italic text -->
      <text x="150" y="93" font-family="Cormorant" font-style="italic" font-weight="700" font-size="50" fill="white" text-anchor="middle" letter-spacing="2">Onicore</text>
      <!-- tiny tagline -->
      <!-- red pole dots -->
      <circle cx="150" cy="8" r="2.5" fill="#e74c3c"/>
      <circle cx="150" cy="152" r="2.5" fill="#e74c3c"/>
    </svg>
  </div>

  <!-- LOGO 5: SLASH LIGHT BG -->
  <div class="logo-card light" id="card5">
    <span class="card-label">01 — On Light</span>
    <button class="dl-btn" onclick="downloadSVG('svg5','onicore-logo-1-light')">↓ JPG</button>
    <svg id="svg5" width="380" height="100" viewBox="0 0 380 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="88" font-family="Inter" font-weight="900" font-size="96" fill="black" letter-spacing="-2">ONICORE</text>
      <line x1="158" y1="8" x2="222" y2="92" stroke="#e74c3c" stroke-width="3.5"/>
      <line x1="0" y1="97" x2="380" y2="97" stroke="#ccc" stroke-width="1"/>
      <line x1="0" y1="97" x2="120" y2="97" stroke="#e74c3c" stroke-width="2"/>
    </svg>
    <div class="tagline" style="color:#bbb">What is Earth Without Art</div>
  </div>

  <!-- LOGO 6: MINIMAL LINE -->
  <div class="logo-card" id="card6">
    <span class="card-label">05 — Minimal Line</span>
    <button class="dl-btn" onclick="downloadSVG('svg6','onicore-logo-5-minimal')">↓ JPG</button>
    <svg id="svg6" width="320" height="90" viewBox="0 0 320 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- top thin line -->
      <line x1="0" y1="10" x2="320" y2="10" stroke="#333" stroke-width="1"/>
      <!-- red segment -->
      <line x1="0" y1="10" x2="80" y2="10" stroke="#e74c3c" stroke-width="2"/>
      <!-- ONICORE -->
      <text x="0" y="72" font-family="Inter" font-weight="800" font-size="70" fill="white" letter-spacing="2">ONICORE</text>
      <!-- bottom thin line -->
      <line x1="0" y1="82" x2="320" y2="82" stroke="#333" stroke-width="1"/>
      <line x1="240" y1="82" x2="320" y2="82" stroke="#e74c3c" stroke-width="2"/>
    </svg>
  </div>

</div>

<script>
  async function downloadSVG(svgId, filename) {
    event.stopPropagation();
    const svg = document.getElementById(svgId);
    const card = svg.closest('.logo-card');

    // Hide UI elements temporarily
    const btn = card.querySelector('.dl-btn');
    const label = card.querySelector('.card-label');
    btn.style.display = 'none';
    label.style.display = 'none';

    try {
      const canvas = await html2canvas(card, {
        scale: 4,
        useCORS: true,
        backgroundColor: null,
        logging: false,
      });

      const a = document.createElement('a');
      a.download = filename + '.jpg';
      a.href = canvas.toDataURL('image/jpeg', 0.97);
      a.click();
    } catch(err) {
      alert('Gagal download: ' + err.message);
    }

    btn.style.display = '';
    label.style.display = '';
  }
</script>
</body>
</html>
